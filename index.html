<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🫧 말랑말랑 화학 방울 게임 🫧</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        /* [이중잠금] 웹폰트가 더 확실하게 로드되도록 CSS 최상단에 한번 더 심어줍니다 */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        :root {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #a8dadc;
            --primary-dark: #457b9d;
            --accent-color: #e63946;
            --card-border: rgba(69, 123, 157, 0.15);
        }

        .dark-mode {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --text-color: #e2e8f0;
            --primary-color: #0f3460;
            --primary-dark: #4ea8de;
            --accent-color: #e94560;
            --card-border: rgba(78, 168, 222, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 이제 Jua 폰트가 완벽히 연동되어 우선적으로 출력됩니다 */
            font-family: 'Jua', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif !important;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--panel-bg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            z-index: 10;
            border-bottom: 1px solid var(--card-border);
        }

        .title-area h1 {
            font-size: 2rem;
            color: var(--primary-dark);
        }

        .logo-area {
            font-size: 1.3rem;
            color: #ff4d6d;
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.15);
            border: 2px dashed #ffb3c1;
        }
        .dark-mode .logo-area {
            background: linear-gradient(135deg, #4c0519, #881337);
            color: #ffe4e6;
            border-color: #f43f5e;
        }

        main {
            flex: 1;
            display: flex;
            width: 100vw;
            height: calc(100dvh - 60px);
            position: relative;
        }

        #control-panel {
            width: 32%;
            min-width: 310px;
            background-color: var(--panel-bg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-right: 1px solid var(--card-border);
            overflow-y: auto;
            z-index: 5;
        }

        #game-panel {
            width: 68%;
            position: relative;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(168, 218, 220, 0.15) 0%, transparent 80%);
        }

        .card {
            background: rgba(168, 218, 220, 0.08);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--primary-dark);
        }

        .student-form {
            display: grid;
            grid-template-columns: repeat(3, 1fr) 2fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        input, select, button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background-color: var(--panel-bg);
            color: var(--text-color);
            font-size: 1.05rem;
            outline: none;
        }
        button {
            background-color: var(--primary-dark);
