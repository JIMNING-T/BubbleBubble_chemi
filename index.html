<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🫧 말랑말랑 화학 방울 게임 🫧</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #a8dadc;
            --primary-dark: #457b9d;
            --accent-color: #e63946;
            --card-border: rgba(69, 123, 157, 0.15);
        }

        .dark-mode {
            --bg-color: #1a1a2e;
            --panel-bg: #16213e;
            --text-color: #e2e8f0;
            --primary-color: #0f3460;
            --primary-dark: #4ea8de;
            --accent-color: #e94560;
            --card-border: rgba(78, 168, 222, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 폰트 로딩 실패 시 기본 고딕체로 보이도록 안전장치 추가 */
            font-family: 'Jua', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif !important;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--panel-bg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            z-index: 10;
            border-bottom: 1px solid var(--card-border);
        }

        .title-area h1 {
            font-size: 2rem;
            color: var(--primary-dark);
        }

        .logo-area {
            font-size: 1.3rem;
            color: #ff4d6d;
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.15);
            border: 2px dashed #ffb3c1;
        }
        .dark-mode .logo-area {
            background: linear-gradient(135deg, #4c0519, #881337);
            color: #ffe4e6;
            border-color: #f43f5e;
        }

        main {
            flex: 1;
            display: flex;
            width: 100vw;
            height: calc(100dvh - 60px);
            position: relative;
        }

        #control-panel {
            width: 32%;
            min-width: 310px;
            background-color: var(--panel-bg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-right: 1px solid var(--card-border);
            overflow-y: auto;
            z-index: 5;
        }

        #game-panel {
            width: 68%;
            position: relative;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(168, 218, 220, 0.15) 0%, transparent 80%);
        }

        .card {
            background: rgba(168, 218, 220, 0.08);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--primary-dark);
        }

        .student-form {
            display: grid;
            grid-template-columns: repeat(3, 1fr) 2fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        input, select, button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background-color: var(--panel-bg);
            color: var(--text-color);
            font-size: 1.05rem;
            outline: none;
        }
        button {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scoreboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: linear-gradient(135deg, #a8dadc, #457b9d);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.15rem;
        }
        .dark-mode .scoreboard {
            background: linear-gradient(135deg, #1d3557, #457b9d);
        }
        .scoreboard-row {
            display: flex;
            width: 100%;
            justify-content: space-around;
        }

        .rank-box {
            max-height: 110px;
            overflow-y: auto;
            background: rgba(0,0,0,0.02);
            padding: 6px;
            border-radius: 8px;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 10px;
            font-size: 0.95rem;
        }

        .util-tray {
            margin-top: auto;
            display: flex;
            gap: 8px;
        }
        .util-tray button {
            flex: 1;
            background-color: rgba(0,0,0,0.04);
            color: var(--text-color);
            font-size: 0.95rem;
        }

        #game-svg {
            width: 100%;
            height: 100%;
            flex: 1;
            background-color: rgba(168, 218, 220, 0.03);
        }

        #input-dock {
            padding: 16px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #answer-input {
            width: 100%;
            max-width: 450px;
            font-size: 1.4rem;
            text-align: center;
            border: 2px solid var(--primary-dark);
        }

        #toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .toast-node {
            background-color: rgba(29, 53, 87, 0.92);
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1.05rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .modal-mask {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(29, 53, 87, 0.6);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-mask.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-window {
            background-color: var(--panel-bg);
            border-radius: 20px;
            width: 85%;
            max-width: 420px;
            padding: 28px;
            text-align: center;
        }

        /* fill 색상을 명시적으로 주어 다크모드/라이트모드 상관없이 글자가 무조건 보이도록 수정 */
        .subscript-node { font-size: 18px; font-weight: bold; fill: #1e293b; }
        .superscript-node { font-size: 18px; font-weight: bold; fill: #1e293b; }
        .screen-guide-text { fill: #457b9d; font-size: 24px; font-weight: bold; }

        @media (max-width: 768px) {
            main { flex-direction: column; height: auto; overflow-y: auto; }
            #control-panel { width: 100%; min-width: 100%; }
            #game-panel { width: 100%; height: 55dvh; min-height: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <h1>🫧 말랑말랑 화학 방울 게임 🫧</h1>
        </div>
        <div class="logo-area">♥지민쌤과 두근두근 과학 학습♥</div>
    </header>

    <main>
        <div id="control-panel">
            <div class="card">
                <h2>👤 학생 정보 입력</h2>
                <div class="student-form">
                    <input type="number" id="stu-grade" value="2" min="1" max="3">
                    <input type="number" id="stu-class" value="1" min="1" max="15">
                    <input type="number" id="stu-number" value="1" min="1" max="40">
                    <input type="text" id="stu-name" value="홍길동" placeholder="이름">
                </div>
                <button id="start-engine-btn" onclick="initializeGameSession()" style="width: 100%; font-size: 1.15rem; background-color: var(--accent-color);">실험 시작 (3분 제한) 🚀</button>
            </div>

            <div class="card">
                <h2>📊 실시간 대시보드</h2>
                <div class="scoreboard" id="scoreboard">
                    <div class="scoreboard-row">
                        <span id="score-display">✨ 점수: 0</span>
                        <span id="combo-display">🔥 콤보: 0</span>
                    </div>
                    <div class="scoreboard-row" style="margin-top: 4px;">
                        <span id="health-display">생명: ❤️ ❤️ ❤️ ❤️ ❤️</span>
                    </div>
                    <div class="scoreboard-row" style="margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.25);">
                        <span id="timer-display" style="color: #fff3b0; font-weight: bold;">⏱️ 남은 시간: 03:00</span>
                    </div>
                </div>
                <h3 style="font-size: 1.1rem; margin: 12px 0 4px 0; color: var(--primary-dark);">🏆 실시간 Top 5 명예의 전당</h3>
                <div class="rank-box">
                    <div id="rank-insertion-point" style="color: #94a3b8; text-align:center; padding: 10px; font-size:0.9rem;">아직 등록된 기록이 없습니다.</div>
                </div>
            </div>

            <div class="card control-group">
                <h2>⚙️ 문제 범위 지정</h2>
                <select id="mission-scope" style="width: 100%;">
                    <option value="total">통합 단원 종합 패키지 (원소+분자+이온)</option>
                    <option value="elements">핵심 원소 기호 (주기율표 1번 ~ 20번)</option>
                    <option value="molecules">필수 주요 분자식 (9종)</option>
                    <option value="ions">단원 핵심 이온 기호 (16종)</option>
                </select>
            </div>

            <div class="util-tray">
                <button id="mute-toggle-btn" onclick="toggleAudioSystem()">🔊 사운드 ON</button>
                <button id="bgm-toggle-btn" onclick="toggleBackgroundAmbiance()">🎵 배경음 OFF</button>
                <button onclick="toggleVisualTheme()">🌓 테마 전환</button>
            </div>
        </div>

        <div id="game-panel">
            <svg id="game-svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <!-- text 태그 안에 기본 x, y 좌표를 명확히 세팅하여 렌더링 누락 방지 -->
                <text x="400" y="400" text-anchor="middle" id="svg-background-notice" class="screen-guide-text" style="display: block;">학생 정보 입력 후 [실험 시작] 버튼을 눌러주세요!</text>
                <g id="fx-particles-group"></g>
                <g id="bubble-entities-group"></g>
            </svg>

            <div id="input-dock">
                <input type="text" id="answer-input" placeholder="정답(이름)을 입력하고 엔터를 누르세요!" onkeydown="if(event.key === 'Enter') evaluatingUserAnswer()" disabled="">
                <button id="submit-btn" onclick="evaluatingUserAnswer()" style="padding: 0 20px;" disabled="">확인</button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <div class="modal-mask" id="global-status-modal">
        <div class="modal-window">
            <h2 id="modal-header-title" style="font-size: 1.8rem; color: var(--accent-color); margin-bottom: 12px;">🎮 실험 종료</h2>
            <div id="modal-core-body" style="font-size: 1.15rem; margin-bottom: 18px; line-height: 1.6; color: var(--text-color);"></div>
            <button onclick="dismissStatusModal()" style="width: 100%; background-color: var(--primary-dark);">확인 완료</button>
        </div>
    </div>

    <script>
        const CHEMICAL_REGISTRY = {
            elements: [
                { symbol: "H", target: ["수소"] }, { symbol: "He", target: ["헬륨"] },
                { symbol: "Li", target: ["리튬"] }, { symbol: "Be", target: ["베릴륨"] },
                { symbol: "B", target: ["붕소"] }, { symbol: "C", target: ["탄소"] },
                { symbol: "N", target: ["질소"] }, { symbol: "O", target: ["산소"] },
                { symbol: "F", target: ["플루오린"] }, { symbol: "Ne", target: ["네온"] },
                { symbol: "Na", target: ["나트륨"] }, { symbol: "Mg", target: ["마그네슘"] },
                { symbol: "Al", target: ["알루미늄"] }, { symbol: "Si", target: ["규소"] },
                { symbol: "P", target: ["인"] }, { symbol: "S", target: ["황"] },
                { symbol: "Cl", target: ["염소"] }, { symbol: "Ar", target: ["아르곤"] },
                { symbol: "K", target: ["칼륨"] }, { symbol: "Ca", target: ["칼슘"] }
            ],
            molecules: [
                { symbol: "O_2", target: ["산소", "산소분자"] }, { symbol: "H_2", target: ["수소", "수소분자"] },
                { symbol: "H_2O", target: ["물"] }, { symbol: "N_2", target: ["질소", "질소분자"] },
                { symbol: "CO", target: ["일산화탄소"] }, { symbol: "CO_2", target: ["이산화탄소"] },
                { symbol: "CH_4", target: ["메테인", "메탄"] }, { symbol: "NH_3", target: ["암모니아"] },
                { symbol: "SO_2", target: ["이산화황"] }
            ],
            ions: [
                { symbol: "OH^-", target: ["수산화이온"] }, { symbol: "CO_3^2-", target: ["탄산이온"] },
                { symbol: "NO_3^-", target: ["질산이온"] }, { symbol: "Mg^2+", target: ["마그네슘이온"] },
                { symbol: "Li^+", target: ["리튬이온"] }, { symbol: "H^+", target: ["수소이온"] },
                { symbol: "Na^+", target: ["나트륨이온"] }, { symbol: "K^+", target: ["칼륨이온"] },
                { symbol: "Ag^+", target: ["은이온"] }, { symbol: "Ca^2+", target: ["칼슘이온"] },
                { symbol: "Fe^2+", target: ["철이온"] }, { symbol: "Cu^2+", target: ["구리이온"] },
                { symbol: "F^-", target: ["플루오린화이온"] }, { symbol: "O^2-", target: ["산화이온"] },
                { symbol: "Cl^-", target: ["염화이온"] }, { symbol: "I^-", target: ["아이오딘화이온"] }
            ]
        };

        const canvasWidth = 800;
        const canvasHeight = 800;

        let engineActive = false;
        let scoreState = 0;
        let comboState = 0; 
        let healthState = 5;
        let activeBubbles = [];
        let activeParticles = [];
        let leaderboardMemory = [];
        
        let timeRemaining = 180; 
        let timerIntervalId = null;
        let animationFrameId = null;
        let currentSpeedMultiplier = 0.8; 

        let lastGenerationTimestamp = 0;
        let intervalConfig = 2500; 

        let audioContextInstance = null;
        let audioMuteState = false;
        let bgmIntervalId = null;
        let bgmActive = false;

        function initAudio() {
            if (!audioContextInstance) {
                audioContextInstance = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContextInstance && audioContextInstance.state === 'suspended') {
                audioContextInstance.resume();
            }
        }

        function triggerAudioSynthesizer(type) {
            if (audioMuteState) return;
            try {
                initAudio();
                const ctx = audioContextInstance;
                const now = ctx.currentTime;
                
                if (type === 'correct') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'fanfare') {
                    [440, 554, 659, 880].forEach((f, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.frequency.value = f;
                        gain.gain.setValueAtTime(0.1, now + i*0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.4);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + i*0.1);
                        osc.stop(now + i*0.1 + 0.4);
                    });
                }
            } catch (e) { console.log("Audio Error context:", e); }
        }

        function toggleAudioSystem() {
            audioMuteState = !audioMuteState;
            document.getElementById('mute-toggle-btn').innerText = audioMuteState ? "🔇 사운드 OFF" : "🔊 사운드 ON";
        }

        function toggleBackgroundAmbiance() {
            bgmActive = !bgmActive;
            const btn = document.getElementById('bgm-toggle-btn');
            if (bgmActive) {
                btn.innerText = "🎵 배경음 ON";
                bgmIntervalId = setInterval(() => {
                    if(audioMuteState || !engineActive) return;
                    try {
                        initAudio();
                        const now = audioContextInstance.currentTime;
                        const osc = audioContextInstance.createOscillator();
                        const gain = audioContextInstance.createGain();
                        const notes = [261.63, 329.63, 392.00, 440.00];
                        osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.03, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                        osc.connect(gain);
                        gain.connect(audioContextInstance.destination);
                        osc.start(now);
                        osc.stop(now + 0.8);
                    } catch(e){}
                }, 1000);
            } else {
                btn.innerText = "🎵 배경음 OFF";
                if(bgmIntervalId) clearInterval(bgmIntervalId);
            }
        }

        function toggleVisualTheme() { 
            document.body.classList.toggle('dark-mode'); 
        }

        function createChemicalSvgText(symbol, gElement) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("class", "chemical-text");
            textNode.setAttribute("text-anchor", "middle");
            textNode.setAttribute("dominant-baseline", "central");
            textNode.setAttribute("y", "0");

        const regex = /([A-Za-z]+)(?:_([0-9]+))?(?:\^([0-9\+\-]+))?/g;
           let match;
           let hasComplexFormatting = false;

            while ((match = regex.exec(symbol)) !== null) {
                hasComplexFormatting = true;
                const base = match[1];
                const sub = match[2];
                const sup = match[3];

                const tspanBase = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                tspanBase.textContent = base;
                tspanBase.setAttribute("dy", "0");
                textNode.appendChild(tspanBase);

                if (sub) {
                    const tspanSub = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspanSub.textContent = sub;
                    tspanSub.setAttribute("class", "subscript-node");
                    tspanSub.setAttribute("dy", "8");
                    textNode.appendChild(tspanSub);
                    
                    const tspanReset = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspanReset.setAttribute("dy", "-8");
                    textNode.appendChild(tspanReset);
                }

                if (sup) {
                    const tspanSup = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspanSup.textContent = sup;
                    tspanSup.setAttribute("class", "superscript-node");
                    tspanSup.setAttribute("dy", "-10");
                    textNode.appendChild(tspanSup);

                    const tspanReset = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspanReset.setAttribute("dy", "10");
                    textNode.appendChild(tspanReset);
                }
            }

            if (!hasComplexFormatting) {
                textNode.textContent = symbol;
            }
            gElement.appendChild(textNode);
        }

        function generateChemicalBubble() {
            const scope = document.getElementById('mission-scope').value;
            let pool = [];
            
            if (scope === 'total') {
                pool = [...CHEMICAL_REGISTRY.elements, ...CHEMICAL_REGISTRY.molecules, ...CHEMICAL_REGISTRY.ions];
            } else {
                pool = CHEMICAL_REGISTRY[scope];
            }

            const chosen = pool[Math.floor(Math.random() * pool.length)];
            const radius = 55;
            const x = Math.random() * (canvasWidth - radius * 2) + radius;
            const y = 60;
            const speed = (Math.random() * 0.8 + 0.02) * currentSpeedMultiplier;

            const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caf0f8", "#dec0f1", "#b9fbc0"];
            const bubbleColor = colors[Math.floor(Math.random() * colors.length)];

            const gGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("r", radius);
            circle.setAttribute("fill", bubbleColor);
            circle.setAttribute("fill-opacity", "0.65");
            circle.setAttribute("stroke", "#457b9d");
            circle.setAttribute("stroke-width", "2.5");
            gGroup.appendChild(circle);

            const highlight = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            highlight.setAttribute("cx", -radius/3);
            highlight.setAttribute("cy", -radius/3);
            highlight.setAttribute("r", radius/5);
            highlight.setAttribute("fill", "#ffffff");
            highlight.setAttribute("fill-opacity", "0.6");
            gGroup.appendChild(highlight);

            createChemicalSvgText(chosen.symbol, gGroup);
            document.getElementById('bubble-entities-group').appendChild(gGroup);

            activeBubbles.push({
                element: gGroup,
                x: x,
                y: y,
                radius: radius,
                speed: speed,
                symbol: chosen.symbol,
                targets: chosen.target
            });
        }

        function createExplosionParticles(x, y) {
            const group = document.getElementById('fx-particles-group');
            for (let i = 0; i < 12; i++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1 + 1.5;
                
                circle.setAttribute("r", Math.random() * 5 + 3);
                circle.setAttribute("fill", "#4ea8de");
                group.appendChild(circle);

                activeParticles.push({
                    element: circle,
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: Math.random() * 0.05 + 0.04
                });
            }
        }

        function mainGameLoop(timestamp) {
            if (!engineActive) return;

            if (!lastGenerationTimestamp) lastGenerationTimestamp = timestamp;
            if (timestamp - lastGenerationTimestamp > intervalConfig) {
                generateChemicalBubble();
                lastGenerationTimestamp = timestamp;
                if (intervalConfig > 900) intervalConfig -= 25;
                currentSpeedMultiplier += 0.05;
            }

            for (let i = activeBubbles.length - 1; i >= 0; i--) {
                const b = activeBubbles[i];
                b.y += b.speed;
                b.element.setAttribute("transform", `translate(${b.x}, ${b.y})`);

                if (b.y > canvasHeight + b.radius) {
                    b.element.remove();
                    activeBubbles.splice(i, 1);
                    
                    healthState--;
                    comboState = 0;
                    triggerAudioSynthesizer('wrong');
                    showToastNotification("방울을 놓쳤습니다! 😢");
                    updateScoreboardDisplay();

                    if (healthState <= 0) {
                        terminateGameSession(false);
                        return;
                    }
                }
            }

            for (let i = activeParticles.length - 1; i >= 0; i--) {
                const p = activeParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) {
                    p.element.remove();
                    activeParticles.splice(i, 1);
                } else {
                    p.element.setAttribute("cx", p.x);
                    p.element.setAttribute("cy", p.y);
                    p.element.setAttribute("opacity", p.life);
                }
            }

            animationFrameId = requestAnimationFrame(mainGameLoop);
        }

        function evaluatingUserAnswer() {
            if (!engineActive) return;
            
            const inputField = document.getElementById('answer-input');
            const ans = inputField.value.trim().replace(/\s+/g, "");
            if (!ans) return;

            let isCorrect = false;

            for (let i = 0; i < activeBubbles.length; i++) {
                const b = activeBubbles[i];
                if (b.targets.includes(ans)) {
                    const bonus = Math.floor(comboState / 3) * 5;
                    scoreState += (10 + bonus);
                    comboState += 1;
                    
                    createExplosionParticles(b.x, b.y);
                    b.element.remove();
                    activeBubbles.splice(i, 1);
                    
                    triggerAudioSynthesizer('correct');
                    isCorrect = true;
                    break;
                }
            }

            if (isCorrect) {
                inputField.value = "";
                updateScoreboardDisplay();
            } else {
               healthState--; 
                inputField.value = ""; //
                comboState = 0;
                triggerAudioSynthesizer('wrong');
                showToastNotification("틀렸거나 일치하는 방울이 없습니다! 😵‍💫");
                updateScoreboardDisplay();
            }
            inputField.focus();
        }

        function initializeGameSession() {
            if (engineActive) return;
            const name = document.getElementById('stu-name').value.trim();
            if (!name) { alert("이름을 입력해주세요!"); return; }
            
            // 핵심 버그 수정: 브라우저 유저 클릭 상호작용 후 사운드 컨텍스트 잠금 해제 강제 유도
            initAudio();

            engineActive = true;
            scoreState = 0;
            comboState = 0;
            healthState = 5;
            timeRemaining = 180;
            intervalConfig = 2500;
            currentSpeedMultiplier = 0.2;
            activeBubbles = [];
            activeParticles = [];
            lastGenerationTimestamp = 0; // 이 부분 누락으로 스폰이 안 되던 버그 교정
            
            document.getElementById('bubble-entities-group').innerHTML = "";
            document.getElementById('fx-particles-group').innerHTML = "";
            document.getElementById('svg-background-notice').style.display = 'none';
            
            document.getElementById('answer-input').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('start-engine-btn').disabled = true;
            document.getElementById('answer-input').focus();
            
            updateScoreboardDisplay();
            
            if (timerIntervalId) clearInterval(timerIntervalId);
            timerIntervalId = setInterval(() => {
                if (!engineActive) return;
                timeRemaining--;
                if (timeRemaining <= 0) {
                    terminateGameSession(true);
                }
                updateScoreboardDisplay();
            }, 1000);
            generateChemicalBubble();
            animationFrameId = requestAnimationFrame(mainGameLoop);
        }

        function updateScoreboardDisplay() {
            document.getElementById('score-display').innerText = `✨ 점수: ${scoreState}`;
            document.getElementById('combo-display').innerText = `🔥 콤보: ${comboState}`;
            document.getElementById('health-display').innerText = `생명: ${"❤️ ".repeat(Math.max(0, healthState))}`;
            
            const min = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const sec = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `⏱️ 남은 시간: ${min}:${sec}`;
        }

        function terminateGameSession(timeOverSuccess) {
            engineActive = false;
            if (timerIntervalId) clearInterval(timerIntervalId);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            document.getElementById('answer-input').disabled = true;
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('start-engine-btn').disabled = false;

            const grade = document.getElementById('stu-grade').value;
            const sClass = document.getElementById('stu-class').value;
            const num = document.getElementById('stu-number').value;
            const name = document.getElementById('stu-name').value.trim();
            const scope = document.getElementById('mission-scope').value; 

            const record = {
                id: `${grade}학년 ${sClass}반 ${name}`,
                score: scoreState
            };
            leaderboardMemory.push(record);
            leaderboardMemory.sort((a, b) => b.score - a.score);

            const rankBox = document.getElementById('rank-insertion-point');
            rankBox.innerHTML = "";
            leaderboardMemory.slice(0, 5).forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "rank-item";
                div.innerHTML = `<span>${index+1}위. ${item.id}</span><strong>${item.score}점</strong>`;
                rankBox.appendChild(div);
            });

            const title = timeOverSuccess ? "🎉 실험 대성공! (시간 만료)" : "🎮 실험 종료 (생명력 소진)";
            const msg = `<b>[실험 결과 보고서]</b><br><br>${grade}학년 ${sClass}반 ${num}번 ${name} 학생<br>최종 획득 점수: <b>${scoreState}점</b><br><br>수고하셨습니다! 결과는 자동으로 교사 시트에 기록됩니다.`;
            
            document.getElementById('modal-header-title').innerText = title;
            document.getElementById('modal-core-body').innerHTML = msg;
            document.getElementById('global-status-modal').classList.add('active');

            triggerAudioSynthesizer('fanfare');

            const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx1g6SwZxWZjPmfNOMAbgJPUlrfSnhxHcHWp_CQ2pglhacjhHNp4zDvQEbn69u9AcUAKw/exec"; 

            const payload = {
                gradeClassNum: `${grade}학년 ${sClass}반 ${num}번`,
                name: name,
                score: scoreState,
                scope: scope
            };

            fetch(GOOGLE_SHEET_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(() => console.log("Google Sheets 데이터 전송 완료"))
            .catch(err => console.error("Google Sheets 전송 실패:", err));
        }

        function dismissStatusModal() {
            document.getElementById('global-status-modal').classList.remove('active');
            document.getElementById('svg-background-notice').style.display = 'block';
        }

        function showToastNotification(text) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-node';
            toast.innerText = text;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = "opacity 0.5s ease";
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 500);
            }, 1500);
}
    </script>
</body>
